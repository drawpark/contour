<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO - PRODUCT DESIGN</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; 
            background-color: #060606; /* 깊이감 있는 딥블랙 */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        #topoCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        
        /* 메인 하이엔드 타이틀 레이어 */
        .title-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10; text-align: center; color: #ffffff;
            pointer-events: none; 
        }
        .title-container h1 {
            font-size: 5.5rem; letter-spacing: 0.16em; margin: 0 0 12px 0; font-weight: 700;
        }
        .title-container p {
            font-size: 1.05rem; letter-spacing: 0.12em; margin: 6px 0; color: #777777; font-weight: 300;
        }
    </style>
</head>
<body>
    <canvas id="topoCanvas"></canvas>

    <div class="title-container">
        <h1>PORTFOLIO</h1>
        <p>PRODUCT DESIGN 2026</p>
        <p>ZURICH</p>
    </div>

    <script>
        const canvas = document.getElementById('topoCanvas');
        const ctx = canvas.getContext('2d');
        
        // 레퍼런스처럼 아주 조밀하고 밀도 높은 선을 만들기 위해 해상도 촘촘히 세팅
        const GRID_RES = 10; 
        let cols, rows;
        let grid = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.ceil(canvas.width / GRID_RES) + 1;
            rows = Math.ceil(canvas.height / GRID_RES) + 1;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        // 고품질 지형용 3D 노이즈 함수
        function hash(x, y, z) {
            let h = Math.sin(x * 12.9898 + y * 78.233 + z * 37.719) * 43758.5453123;
            return h - Math.floor(h);
        }
        function noise3D(x, y, z) {
            let ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
            let fx = x - ix, fy = y - iy, fz = z - iz;
            let ux = fx * fx * (3.0 - 2.0 * fx), uy = fy * fy * (3.0 - 2.0 * fy), uz = fz * fz * (3.0 - 2.0 * fz);
            let n000 = hash(ix, iy, iz), n100 = hash(ix + 1, iy, iz), n010 = hash(ix, iy + 1, iz), n110 = hash(ix + 1, iy + 1, iz);
            let n001 = hash(ix, iy, iz + 1), n101 = hash(ix + 1, iy, iz + 1), n011 = hash(ix, iy + 1, iz + 1), n111 = hash(ix + 1, iy + 1, iz + 1);
            let nx00 = n000 * (1 - ux) + n100 * ux, nx10 = n010 * (1 - ux) + n110 * ux;
            let nx01 = n001 * (1 - ux) + n101 * ux, nx11 = n011 * (1 - ux) + n111 * ux;
            let nxy0 = nx00 * (1 - uy) + nx10 * uy, nxy1 = nx01 * (1 - uy) + nx11 * uy;
            return nxy0 * (1 - uz) + nxy1 * uz;
        }

        // 다중 옥타브 노이즈 (진짜 정밀한 지도 등고선 느낌을 내는 핵심 치트키)
        function fbm(x, y, z) {
            let value = 0;
            let amplitude = 1.0;
            let frequency = 0.003;
            for (let i = 0; i < 3; i++) {
                value += amplitude * noise3D(x * frequency, y * frequency, z);
                amplitude *= 0.5;
                frequency *= 2.3;
            }
            return value;
        }

        let fullTextStream = "conversion_rate:+14.5% // task_duration:-82% // churn_rate:decreased // user_retention:optimized // active_connections:2048 // ";
        let time = 0;
        const FONT_SIZE = 9;
        const CHAR_WIDTH = 5.2; 
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            time += 0.0025; // 하이엔드 무드에 걸맞게 아주 부드럽고 느린 흐름
            let flowOffset = time * 130; 

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const clearRadius = Math.min(canvas.width, canvas.height) * 0.28; // 타이틀 보호 반경

            // 1. 공간 왜곡 공식을 이용한 완벽한 고도 그리드 생성
            for (let i = 0; i < cols; i++) {
                grid[i] = [];
                for (let j = 0; j < rows; j++) {
                    let px = i * GRID_RES;
                    let py = j * GRID_RES;
                    
                    let dx = px - centerX;
                    let dy = py - centerY;
                    let dist = Math.hypot(dx, dy);
                    
                    // 🌟 핵심: 중앙부 좌표를 스무스하게 외곽으로 밀어냄 (선 뭉침/끊김 근본적 해결)
                    let warp = Math.exp(-Math.pow(dist / clearRadius, 2));
                    let sx = centerX + dx * (1 - warp * 0.75);
                    let sy = centerY + dy * (1 - warp * 0.75);

                    // 왜곡된 공간 위에 고밀도 지형 계산
                    grid[i][j] = fbm(sx, sy, time * 0.2) * 2.5;
                }
            }

            // 2. 화면 전체에 균일하게 깔릴 등고선 레이어 생성
            let thresholds = [];
            for (let t = -2.2; t <= 2.2; t += 0.18) {
                thresholds.push(t);
            }
            let allPaths = [];

            // 3. Marching Squares 알고리즘으로 연속적인 등고선 추출
            for (let t of thresholds) {
                let segments = [];
                for (let i = 0; i < cols - 1; i++) {
                    for (let j = 0; j < rows - 1; j++) {
                        let v0 = grid[i][j], v1 = grid[i + 1][j], v2 = grid[i + 1][j + 1], v3 = grid[i][j + 1];
                        let state = 0;
                        if (v0 > t) state |= 1;
                        if (v1 > t) state |= 2;
                        if (v2 > t) state |= 4;
                        if (v3 > t) state |= 8;

                        if (state === 0 || state === 15) continue;

                        let p = (vA, vB) => (Math.abs(vB - vA) < 0.0001) ? 0.5 : (t - vA) / (vB - vA);

                        let top = [i + p(v0, v1), j];
                        let right = [i + 1, j + p(v1, v2)];
                        let bottom = [i + p(v3, v2), j + 1];
                        let left = [i, j + p(v0, v3)];

                        let pts = [];
                        if (state === 1 || state === 14) pts.push(left, top);
                        else if (state === 2 || state === 13) pts.push(top, right);
                        else if (state === 4 || state === 11) pts.push(right, bottom);
                        else if (state === 8 || state === 7) pts.push(bottom, left);
                        else if (state === 3 || state === 12) pts.push(left, right);
                        else if (state === 6 || state === 9) pts.push(top, bottom);
                        else if (state === 5) pts.push(left, top, right, bottom);
                        else if (state === 10) pts.push(top, right, bottom, left);

                        if (pts.length === 2) segments.push({p1: pts[0], p2: pts[1]});
                        if (pts.length === 4) { segments.push({p1: pts[0], p2: pts[1]}); segments.push({p1: pts[2], p2: pts[3]}); }
                    }
                }

                // 세그먼트들을 하나의 긴 선(Path)으로 정밀 조립
                let ptKey = p => p[0].toFixed(2) + ',' + p[1].toFixed(2);
                let adj = new Map();
                for (let s of segments) {
                    let k1 = ptKey(s.p1), k2 = ptKey(s.p2);
                    if (!adj.has(k1)) adj.set(k1, []);
                    if (!adj.has(k2)) adj.set(k2, []);
                    adj.get(k1).push({k: k2, pt: s.p2, seg: s});
                    adj.get(k2).push({k: k1, pt: s.p1, seg: s});
                }

                let visitedSegs = new Set();
                for (let s of segments) {
                    if (visitedSegs.has(s)) continue;
                    let path = [s.p1, s.p2];
                    visitedSegs.add(s);
                    
                    let currK = ptKey(s.p2);
                    while(true) {
                        let nexts = adj.get(currK) || [];
                        let found = false;
                        for (let n of nexts) {
                            if (!visitedSegs.has(n.seg)) {
                                visitedSegs.add(n.seg); path.push(n.pt); currK = n.k; found = true; break;
                            }
                        }
                        if (!found) break;
                    }
                    
                    // 지그재그 꺾임 방지 부드러운 스무딩 필터 적용
                    let smoothed = [path[0]];
                    for(let k = 1; k < path.length - 1; k++) {
                        smoothed.push([
                            path[k-1][0]*0.25 + path[k][0]*0.5 + path[k+1][0]*0.25,
                            path[k-1][1]*0.25 + path[k][1]*0.5 + path[k+1][1]*0.25
                        ]);
                    }
                    smoothed.push(path[path.length-1]);
                    allPaths.push(smoothed);
                }
            }

            // 4. 조립된 등고선 경로 위에 프리미엄 반투명 텍스트 스트림 렌더링
            ctx.font = `${FONT_SIZE}px monospace`;
            ctx.textBaseline = "middle";

            for (let path of allPaths) {
                if(path.length < 4) continue; 

                let currentLen = (flowOffset + path[0][0] * 25) % 700; 
                let charIdx = 0;
                let pIdx = 0;

                while(pIdx < path.length - 1) {
                    let p1 = path[pIdx], p2 = path[pIdx+1];
                    let dx = (p2[0] - p1[0]) * GRID_RES;
                    let dy = (p2[1] - p1[1]) * GRID_RES;
                    let dist = Math.hypot(dx, dy);

                    if (currentLen + CHAR_WIDTH <= dist) {
                        let t = currentLen / dist;
                        let cx = p1[0] * GRID_RES + dx * t;
                        let cy = p1[1] * GRID_RES + dy * t;
                        
                        // 🌟 안전 마스크: 중앙 타이틀 주변 글자들은 눈에 거슬리지 않게 투명도를 스무스하게 조절
                        let textDist = Math.hypot(cx - centerX, cy - centerY);
                        let alpha = 0.24; // 기본 선들의 은은한 투명도
                        
                        if (textDist < clearRadius) {
                            if (textDist < clearRadius * 0.72) {
                                alpha = 0; // 글자 바로 주변은 완벽하게 청정 구역화
                            } else {
                                // 경계면 투명도 스무스 보간
                                let fade = (textDist - clearRadius * 0.72) / (clearRadius * 0.28);
                                alpha *= fade * fade;
                            }
                        }

                        if (alpha > 0) {
                            let angle = Math.atan2(dy, dx);
                            ctx.save();
                            ctx.translate(cx, cy);
                            ctx.rotate(angle);
                            ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                            ctx.fillText(fullTextStream[charIdx % fullTextStream.length], 0, 0);
                            ctx.restore();
                        }

                        currentLen += CHAR_WIDTH;
                        charIdx++;
                    } else {
                        currentLen -= dist;
                        pIdx++;
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        document.fonts.ready.then(() => { animate(); });
    </script>
</body>
</html>
