<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA TO INSIGHT</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #030304; /* 깊고 고급스러운 다크 블랙 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #topoCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        .center-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; pointer-events: none;
        }
        .title {
            color: #ffffff; font-size: 3.8rem; font-weight: 700;
            letter-spacing: 0.8rem; margin: 0; text-transform: uppercase;
            white-space: nowrap; text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }
        .subtitle {
            color: #38383f; font-size: 0.8rem; letter-spacing: 0.35rem;
            margin-top: 18px; text-transform: uppercase; font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="center-container">
        <h1 class="title">DATA TO INSIGHT</h1>
        <div class="subtitle">Generic Product & SaaS Designer Portfolio</div>
    </div>

    <canvas id="topoCanvas"></canvas>

    <script>
        const canvas = document.getElementById('topoCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 마우스 설정 (반응 반경 및 부드러운 감속값)
        const mouse = { x: null, y: null, radius: 200, currentRadius: 0 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            mouse.currentRadius = Math.min(mouse.radius, mouse.currentRadius + 25);
        });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; mouse.currentRadius = 0; });

        // Math Noise Functions
        function hash(x, y) {
            let h = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453123;
            return h - Math.floor(h);
        }
        function noise2D(x, y) {
            let ix = Math.floor(x); let iy = Math.floor(y);
            let fx = x - ix; let fy = y - iy;
            let ux = fx * fx * (3.0 - 2.0 * fx); let uy = fy * fy * (3.0 - 2.0 * fy);
            return hash(ix, iy) * (1 - ux) * (1 - uy) + hash(ix + 1, iy) * ux * (1 - uy) + hash(ix, iy + 1) * (1 - ux) * uy + hash(ix + 1, iy + 1) * ux * uy;
        }
        function fbm(x, y) {
            let v = 0.0; let a = 0.5;
            for (let i = 0; i < 3; i++) {
                v += a * noise2D(x, y); x *= 2.0; y *= 2.0; a *= 0.5;
            }
            return v;
        }

        let rings = [];
        const totalRings = 45; // 촘촘함을 유지하는 고밀도 등고선 세팅

        async function init() {
            try {
                const response = await fetch('data.json');
                const dataLayers = await response.json();
                
                for (let i = 0; i < totalRings; i++) {
                    const ratio = i / totalRings;
                    let textSet = dataLayers.inner;
                    let opacity = 0.5 - (ratio * 0.3); // 안쪽 코어는 선명하게, 바깥은 은은하게 배경화
                    
                    if (ratio > 0.22 && ratio <= 0.65) textSet = dataLayers.middle;
                    else if (ratio > 0.65) textSet = dataLayers.outer;

                    rings.push({ 
                        ratio, 
                        // JSON 데이터 전체를 하나의 끊김 없는 데이터 스트림으로 통합
                        fullTextStream: textSet.join(" ") + " ", // 문장 사이 공백 추가로 seamless 흐름
                        opacity,
                        flowSpeed: 0.001 + (1 - ratio) * 0.0015, // 안쪽 비즈니스 데이터가 더 핵심적이므로 빠르게 흐름
                        noiseSeed: Math.random() * 100
                    });
                }
                animate();
            } catch (e) { console.error("JSON 로드 에러:", e); }
        }

        let time = 0;

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time += 0.3; // 지형 변형 및 흐름 속도 제어

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxRadius = Math.max(canvas.width, canvas.height) * 0.85;

            rings.forEach((ring) => {
                const baseRadius = 70 + ring.ratio * maxRadius;
                
                // -------------------------------------------------------------
                // 🌟 최적화 핵심 1단계: 이번 프레임의 등고선 형상(궤도) 미리 연산하기
                // -------------------------------------------------------------
                const pathPoints = [];
                const numPathPoints = 360; // 고해상도 지형을 위해 정밀도를 두 배로 늘림
                
                for (let i = 0; i < numPathPoints; i++) {
                    let a = (i / numPathPoints) * Math.PI * 2;
                    let nx = Math.cos(a);
                    let ny = Math.sin(a);
                    
                    // 모든 점이 유기적인 공간 노이즈 필드를 공유하여 winding 지형 생성
                    let noiseVal = fbm(nx * 1.5, ny * 1.5 + time * 0.004 + ring.noiseSeed * 0.05);
                    let currentRadius = baseRadius + noiseVal * 180; // 변형 진폭

                    let x = centerX + nx * currentRadius;
                    let y = centerY + ny * currentRadius;

                    // 마우스 호버 시 등고선 궤도 자체를 부드럽게 밀어냄 (고무줄 효과)
                    if (mouse.x !== null && mouse.y !== null) {
                        const dx = x - mouse.x; const dy = y - mouse.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < mouse.currentRadius) {
                            const force = (mouse.currentRadius - dist) / mouse.currentRadius;
                            x += (dx / dist) * force * 70;
                            y += (dy / dist) * force * 70;
                        }
                    }
                    pathPoints.push({ x, y, radius: currentRadius });
                }

                // -------------------------------------------------------------
                // 🌟 최적화 핵심 2단계: 연산된 궤도 좌표를 기반으로 텍스트 초고속 보간 배치
                // -------------------------------------------------------------
                function getPointOnPath(targetAngle) {
                    // 입력 각도를 0 ~ 2*PI 범위로 정규화
                    targetAngle = ((targetAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                    let indexFloat = (targetAngle / (Math.PI * 2)) * numPathPoints;
                    let idx1 = Math.floor(indexFloat) % numPathPoints;
                    let idx2 = (idx1 + 1) % numPathPoints;
                    let t = indexFloat - Math.floor(indexFloat);
                    
                    let p1 = pathPoints[idx1];
                    let p2 = pathPoints[idx2];
                    
                    // 선형 보간으로 정확한 x, y 좌표 및 접선 기울기 도출
                    return {
                        x: p1.x * (1 - t) + p2.x * t,
                        y: p1.y * (1 - t) + p2.y * t,
                        currentRadius: p1.radius * (1 - t) + p2.radius * t,
                        tangent: Math.atan2(p2.y - p1.y, p2.x - p1.x)
                    };
                }

                ctx.font = "8px monospace"; // 레퍼런스처럼 미니멀하고 촘촘한 선을 위해 폰트 사이즈 축소
                ctx.textBaseline = "middle";

                // 등고선 둘레 길이에 맞추어 데이터가 가득 차도록 텍스트 수 조절
                const numTexts = Math.floor(baseRadius * 0.04);
                
                for (let j = 0; j < numTexts; j++) {
                    // 🌟 유체 흐름의 핵심: 시작 각도에 'time * 속도'를 더해 텍스트가 선을 따라 전진하게 만듦
                    let textStartAngle = (j / numTexts) * Math.PI * 2 + (time * ring.flowSpeed);
                    
                    let currentAngle = textStartAngle;
                    
                    // 🌟 연속성 확보의 핵심: 글자 한 자 한 자를 Seamless Stream에서 가져와 배치
                    for (let k = 0; k < ring.fullTextStream.length; k++) {
                        const char = ring.fullTextStream[k];
                        
                        // 미리 계산된 경로에서 현재 각도에 해당하는 스냅샷 좌표 추출
                        let pt = getPointOnPath(currentAngle);
                        
                        ctx.save();
                        ctx.translate(pt.x, pt.y);
                        ctx.rotate(pt.tangent); // 개별 글자가 지형 방향에 맞춰 완벽히 누움
                        
                        ctx.fillStyle = `rgba(255, 255, 255, ${ring.opacity})`;
                        ctx.fillText(char, 0, 0);
                        ctx.restore();
                        
                        // 다음 글자가 겹치지 않도록 글자 너비만큼 각도 전진 (+1px 자간 추가)
                        const charWidth = ctx.measureText(char).width + 1;
                        currentAngle += charWidth / pt.currentRadius;
                    }
                }
            });

            requestAnimationFrame(animate);
        }

        init();
    </script>
</body>
</html>
