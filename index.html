<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA TO INSIGHT</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; 
            background-color: #111111; /* 레퍼런스 느낌의 무광 다크 그레이 */
            font-family: monospace;
        }
        #topoCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
    </style>
</head>
<body>
    <canvas id="topoCanvas"></canvas>

    <script>
        const canvas = document.getElementById('topoCanvas');
        const ctx = canvas.getContext('2d');

        // 최적화를 위한 그리드 설정 (값이 작을수록 정교하지만 연산량 증가)
        const GRID_RES = 16; 
        let cols, rows;
        let grid = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.ceil(canvas.width / GRID_RES) + 1;
            rows = Math.ceil(canvas.height / GRID_RES) + 1;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // --- 1. 가볍고 강력한 3D 노이즈 함수 ---
        function hash(x, y, z) {
            let h = Math.sin(x * 12.9898 + y * 78.233 + z * 37.719) * 43758.5453123;
            return h - Math.floor(h);
        }
        function noise3D(x, y, z) {
            let ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
            let fx = x - ix, fy = y - iy, fz = z - iz;
            let ux = fx * fx * (3.0 - 2.0 * fx), uy = fy * fy * (3.0 - 2.0 * fy), uz = fz * fz * (3.0 - 2.0 * fz);
            let n000 = hash(ix, iy, iz), n100 = hash(ix + 1, iy, iz), n010 = hash(ix, iy + 1, iz), n110 = hash(ix + 1, iy + 1, iz);
            let n001 = hash(ix, iy, iz + 1), n101 = hash(ix + 1, iy, iz + 1), n011 = hash(ix, iy + 1, iz + 1), n111 = hash(ix + 1, iy + 1, iz + 1);
            let nx00 = n000 * (1 - ux) + n100 * ux, nx10 = n010 * (1 - ux) + n110 * ux;
            let nx01 = n001 * (1 - ux) + n101 * ux, nx11 = n011 * (1 - ux) + n111 * ux;
            let nxy0 = nx00 * (1 - uy) + nx10 * uy, nxy1 = nx01 * (1 - uy) + nx11 * uy;
            return nxy0 * (1 - uz) + nxy1 * uz;
        }

        let fullTextStream = "DATA_PIPELINE_ACTIVE:200_OK // PIPELINE_LATENCY:14MS // USER_RETENTION:OPTIMIZED // ";
        
        async function init() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                fullTextStream = [...data.inner, ...data.middle, ...data.outer].join(" // ") + " // ";
            } catch (e) {
                console.log("data.json 로드 실패, 기본 텍스트를 사용합니다.");
            }
            animate();
        }

        let time = 0;
        const FONT_SIZE = 10;
        const CHAR_WIDTH = 6; // measureText 대신 고정폭 사용 (60FPS 유지의 핵심)

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time += 0.003; // 지형이 변하는 속도

            // 1. 노이즈 필드 그리드 생성
            for (let i = 0; i < cols; i++) {
                grid[i] = [];
                for (let j = 0; j < rows; j++) {
                    // x, y 배율이 작을수록 블롭(덩어리)이 커짐 (레퍼런스 이미지 느낌)
                    grid[i][j] = noise3D(i * 0.05, j * 0.05, time); 
                }
            }

            // 2. 등고선 레벨(Threshold) 설정
            let thresholds = [];
            for(let i = 0; i < 20; i++) {
                thresholds.push(-0.6 + (i / 19) * 1.2); // -0.6 ~ 0.6 범위의 20겹 선
            }

            let allPaths = [];

            // 3. Marching Squares 알고리즘 (지형 높이 맵에서 등고선 추출)
            for (let t of thresholds) {
                let segments = [];
                for (let i = 0; i < cols - 1; i++) {
                    for (let j = 0; j < rows - 1; j++) {
                        let v0 = grid[i][j];
                        let v1 = grid[i + 1][j];
                        let v2 = grid[i + 1][j + 1];
                        let v3 = grid[i][j + 1];

                        let state = 0;
                        if (v0 > t) state |= 1;
                        if (v1 > t) state |= 2;
                        if (v2 > t) state |= 4;
                        if (v3 > t) state |= 8;

                        if (state === 0 || state === 15) continue;

                        let p = (vA, vB) => {
                            let diff = vB - vA;
                            if (Math.abs(diff) < 0.0001) return 0.5;
                            return (t - vA) / diff;
                        };

                        let top = [i + p(v0, v1), j];
                        let right = [i + 1, j + p(v1, v2)];
                        let bottom = [i + p(v3, v2), j + 1];
                        let left = [i, j + p(v0, v3)];

                        let pts = [];
                        if (state === 1 || state === 14) pts.push(left, top);
                        else if (state === 2 || state === 13) pts.push(top, right);
                        else if (state === 4 || state === 11) pts.push(right, bottom);
                        else if (state === 8 || state === 7) pts.push(bottom, left);
                        else if (state === 3 || state === 12) pts.push(left, right);
                        else if (state === 6 || state === 9) pts.push(top, bottom);
                        else if (state === 5) pts.push(left, top, right, bottom);
                        else if (state === 10) pts.push(top, right, bottom, left);

                        if (pts.length === 2) segments.push({p1: pts[0], p2: pts[1]});
                        if (pts.length === 4) {
                            segments.push({p1: pts[0], p2: pts[1]});
                            segments.push({p1: pts[2], p2: pts[3]});
                        }
                    }
                }

                // 4. 추출된 선분(Segment)들을 이어붙여 하나의 길쭉한 Path로 만듦
                let ptKey = p => p[0].toFixed(2) + ',' + p[1].toFixed(2);
                let adj = new Map();
                for (let s of segments) {
                    let k1 = ptKey(s.p1), k2 = ptKey(s.p2);
                    if (!adj.has(k1)) adj.set(k1, []);
                    if (!adj.has(k2)) adj.set(k2, []);
                    adj.get(k1).push({k: k2, pt: s.p2, seg: s});
                    adj.get(k2).push({k: k1, pt: s.p1, seg: s});
                }

                let visitedSegs = new Set();
                for (let s of segments) {
                    if (visitedSegs.has(s)) continue;
                    let path = [s.p1, s.p2];
                    visitedSegs.add(s);
                    
                    let currK = ptKey(s.p2);
                    while(true) {
                        let nexts = adj.get(currK) || [];
                        let found = false;
                        for (let n of nexts) {
                            if (!visitedSegs.has(n.seg)) {
                                visitedSegs.add(n.seg);
                                path.push(n.pt);
                                currK = n.k;
                                found = true;
                                break;
                            }
                        }
                        if (!found) break;
                    }
                    
                    currK = ptKey(s.p1);
                    while(true) {
                        let nexts = adj.get(currK) || [];
                        let found = false;
                        for (let n of nexts) {
                            if (!visitedSegs.has(n.seg)) {
                                visitedSegs.add(n.seg);
                                path.unshift(n.pt);
                                currK = n.k;
                                found = true;
                                break;
                            }
                        }
                        if (!found) break;
                    }
                    
                    // Path 스무딩 (부드러운 곡선을 위해 점들을 이동평균 처리)
                    for (let iter = 0; iter < 2; iter++) {
                        let smoothed = [path[0]];
                        for (let k = 1; k < path.length - 1; k++) {
                            smoothed.push([
                                path[k][0]*0.5 + path[k-1][0]*0.25 + path[k+1][0]*0.25,
                                path[k][1]*0.5 + path[k-1][1]*0.25 + path[k+1][1]*0.25
                            ]);
                        }
                        smoothed.push(path[path.length - 1]);
                        path = smoothed;
                    }
                    allPaths.push(path);
                }
            }

            // 5. 부드럽게 이어지는 Path 위에 글자 한 자씩 눕혀서 그리기
            ctx.font = `${FONT_SIZE}px monospace`;
            ctx.textBaseline = "middle";
            ctx.fillStyle = "rgba(255, 255, 255, 0.7)";

            let globalFlow = (time * 15) % 100; // 글자가 선을 타고 흐르는 속도

            for (let path of allPaths) {
                if(path.length < 5) continue; // 너무 짧은 파편은 무시

                let currentLen = globalFlow; 
                let charIdx = 0;
                let pIdx = 0;

                while(pIdx < path.length - 1) {
                    let p1 = path[pIdx], p2 = path[pIdx+1];
                    let dx = (p2[0] - p1[0]) * GRID_RES;
                    let dy = (p2[1] - p1[1]) * GRID_RES;
                    let dist = Math.hypot(dx, dy);

                    if (currentLen + CHAR_WIDTH <= dist) {
                        let t = currentLen / dist;
                        let cx = p1[0] * GRID_RES + dx * t;
                        let cy = p1[1] * GRID_RES + dy * t;
                        let angle = Math.atan2(dy, dx);

                        ctx.save();
                        ctx.translate(cx, cy);
                        ctx.rotate(angle);
                        // 레퍼런스처럼 선은 빼고 오직 글자만 찍습니다.
                        ctx.fillText(fullTextStream[charIdx % fullTextStream.length], 0, 0);
                        ctx.restore();

                        currentLen += CHAR_WIDTH;
                        charIdx++;
                    } else {
                        currentLen -= dist;
                        pIdx++;
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        // 구동 시작
        document.fonts.ready.then(() => {
            init();
        });
    </script>
</body>
</html>
