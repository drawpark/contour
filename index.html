<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA TO INSIGHT</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #050507; /* 깊고 고급스러운 다크 네이비 블랙 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #topoCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        .center-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; pointer-events: none;
        }
        .title {
            color: #ffffff; font-size: 3.8rem; font-weight: 700;
            letter-spacing: 0.8rem; margin: 0; text-transform: uppercase;
            white-space: nowrap;
        }
        .subtitle {
            color: #44444a; font-size: 0.8rem; letter-spacing: 0.3rem;
            margin-top: 16px; text-transform: uppercase; font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="center-container">
        <h1 class="title">DATA TO INSIGHT</h1>
        <div class="subtitle">Generic Product & SaaS Designer Portfolio</div>
    </div>

    <canvas id="topoCanvas"></canvas>

    <script>
        const canvas = document.getElementById('topoCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const mouse = { x: null, y: null, radius: 200, currentRadius: 0 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            mouse.currentRadius = Math.min(mouse.radius, mouse.currentRadius + 15);
        });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; mouse.currentRadius = 0; });

        // --- 🛠️ 하이엔드 지형 구현을 위한 2D 수학적 노이즈 알고리즘 ---
        function hash(x, y) {
            let h = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453123;
            return h - Math.floor(h);
        }
        function noise2D(x, y) {
            let ix = Math.floor(x); let iy = Math.floor(y);
            let fx = x - ix; let fy = y - iy;
            let ux = fx * fx * (3.0 - 2.0 * fx); let uy = fy * fy * (3.0 - 2.0 * fy);
            return a = hash(ix, iy), b = hash(ix + 1, iy), c = hash(ix, iy + 1), d = hash(ix + 1, iy + 1),
                   a * (1 - ux) * (1 - uy) + b * ux * (1 - uy) + c * (1 - ux) * uy + d * ux * uy;
        }
        function fbm(x, y) { // 다중 하모닉스를 중첩해 자연스러운 산맥 능선 생성
            let v = 0.0; let a = 0.5;
            for (let i = 0; i < 3; i++) {
                v += a * noise2D(x, y); x *= 2.0; y *= 2.0; a *= 0.5;
            }
            return v;
        }

        let rings = [];
        const totalRings = 40; // 레퍼런스처럼 극도로 촘촘하고 밀도 높은 선 유지를 위해 대폭 확장

        async function init() {
            try {
                const response = await fetch('data.json');
                const dataLayers = await response.json();
                
                for (let i = 0; i < totalRings; i++) {
                    const ratio = i / totalRings;
                    let textSet = dataLayers.inner;
                    let opacity = 0.4 - (ratio * 0.25); // 안쪽은 선명하게, 바깥쪽은 아주 은은하게 배경화
                    
                    if (ratio > 0.2 && ratio <= 0.6) textSet = dataLayers.middle;
                    else if (ratio > 0.6) textSet = dataLayers.outer;

                    rings.push({ ratio, textSet, opacity });
                }
                animate();
            } catch (e) { console.error("JSON 로드 에러:", e); }
        }

        let time = 0;

        // 특정 각도와 고유 반지름에서 변형된 등고선 좌표를 구해주는 함수
        function getContourPoint(centerX, centerY, baseRadius, angle, ratio) {
            let nx = Math.cos(angle);
            let ny = Math.sin(angle);
            
            // 핵심 분기점: 모든 링이 공간상에서 일관된 노이즈 필드를 공유하게 만듦 (선끼리 절대 꼬이지 않는 비결)
            let noiseVal = fbm(nx * 1.4, ny * 1.4 + time * 0.008 + ratio * 0.3);
            let currentRadius = baseRadius + noiseVal * 160; // 변형 진폭

            let x = centerX + Math.cos(angle) * currentRadius;
            let y = centerY + Math.sin(angle) * currentRadius;

            // 마우스 호버 시 유체처럼 부드럽게 밀려나는 인터랙션
            if (mouse.x !== null && mouse.y !== null) {
                const dx = x - mouse.x; const dy = y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < mouse.currentRadius) {
                    const force = (mouse.currentRadius - dist) / mouse.currentRadius;
                    x += (dx / dist) * force * 50;
                    y += (dy / dist) * force * 50;
                }
            }
            return { x, y };
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time += 0.3; // 지형이 살아 움직이는 속도 (너무 빠르지 않게 스멀스멀 흐르도록 제어)

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxRadius = Math.max(canvas.width, canvas.height) * 0.75;

            rings.forEach((ring) => {
                const baseRadius = 60 + ring.ratio * maxRadius;
                const steps = 200; // 선을 매끄럽게 그리기 위한 정밀도

                // --- 1단계: 실같이 가느다란 가이드 등고선(Stroke) 그리기 ---
                ctx.beginPath();
                for (let i = 0; i <= steps; i++) {
                    let angle = (i / steps) * Math.PI * 2;
                    let pt = getContourPoint(centerX, centerY, baseRadius, angle, ring.ratio);
                    if (i === 0) ctx.moveTo(pt.x, pt.y);
                    else ctx.lineTo(pt.x, pt.y);
                }
                ctx.strokeStyle = `rgba(255, 255, 255, ${ring.opacity * 0.35})`;
                ctx.lineWidth = 0.6;
                ctx.stroke();

                // --- 2단계: 그 등고선 능선 위에 데이터 텍스트 안착시키기 ---
                ctx.font = "9px monospace";
                ctx.textBaseline = "middle";

                // 반지름 길이에 비례해서 글자가 적당히 띄엄띄엄 배치되도록 세팅
                const numTexts = Math.floor(baseRadius * 0.04); 
                
                for (let j = 0; j < numTexts; j++) {
                    let angle = (j / numTexts) * Math.PI * 2;
                    
                    // 현재 위치(pt1)와 미세하게 앞선 위치(pt2)를 구해 선의 기울기(접선)를 계산
                    let pt1 = getContourPoint(centerX, centerY, baseRadius, angle, ring.ratio);
                    let pt2 = getContourPoint(centerX, centerY, baseRadius, angle + 0.01, ring.ratio);
                    
                    let tangentAngle = Math.atan2(pt2.y - pt1.y, pt2.x - pt1.x);
                    const text = ring.textSet[j % ring.textSet.length];

                    ctx.save();
                    ctx.translate(pt1.x, pt1.y);
                    ctx.rotate(tangentAngle); // 🌟 관람차 탈피의 핵심: 글자를 등고선 곡률에 맞춰 완벽히 눕힘
                    
                    // 글자 자체의 불투명도는 선보다 조금 더 주어 가독성 확보
                    ctx.fillStyle = `rgba(255, 255, 255, ${ring.opacity * 1.2})`;
                    
                    // 약간의 오프셋을 주어 선 바로 위에 얹혀진 느낌 연출
                    ctx.fillText(text, 0, -2); 
                    ctx.restore();
                }
            });

            requestAnimationFrame(animate);
        }

        init();
    </script>
</body>
</html>
