<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO - PRODUCT DESIGN</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; 
            background-color: #080808; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        #topoCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        
        /* 🌟 가운데 포트폴리오 제목이 들어갈 텍스트 레이어 */
        .title-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            color: #eeeeee;
            pointer-events: none; /* 마우스 간섭 방지 */
        }
        .title-container h1 {
            font-size: 5rem;
            letter-spacing: 0.1em;
            margin: 0 0 10px 0;
            font-weight: 700;
        }
        .title-container p {
            font-size: 1.2rem;
            letter-spacing: 0.05em;
            margin: 5px 0;
            font-weight: 300;
            color: #aaaaaa;
        }
    </style>
</head>
<body>
    <canvas id="topoCanvas"></canvas>

    <div class="title-container">
        <h1>PORTFOLIO</h1>
        <p>PRODUCT DESIGN 2026</p>
        <p>ZURICH</p>
    </div>

    <script>
        const canvas = document.getElementById('topoCanvas');
        const ctx = canvas.getContext('2d');

        const GRID_RES = 18; // 성능을 위해 살짝 조절
        let cols, rows;
        let grid = [];
        let baseNoiseGrid = []; // 매 프레임 계산량을 줄이기 위한 정적 노이즈
        
        // 새로고침 할 때마다 지형이 조금씩 달라지도록 시드값 부여
        const randomSeed = Math.random() * 1000; 

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.ceil(canvas.width / GRID_RES) + 1;
            rows = Math.ceil(canvas.height / GRID_RES) + 1;
            
            // 화면 크기가 바뀔 때 기본 노이즈 지형을 한 번만 계산
            for (let i = 0; i < cols; i++) {
                baseNoiseGrid[i] = [];
                for (let j = 0; j < rows; j++) {
                    baseNoiseGrid[i][j] = noise3D(i * 0.04, j * 0.04, randomSeed) * 1.5;
                }
            }
        }
        
        // 3D 노이즈 함수 (유지)
        function hash(x, y, z) {
            let h = Math.sin(x * 12.9898 + y * 78.233 + z * 37.719) * 43758.5453123;
            return h - Math.floor(h);
        }
        function noise3D(x, y, z) {
            let ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
            let fx = x - ix, fy = y - iy, fz = z - iz;
            let ux = fx * fx * (3.0 - 2.0 * fx), uy = fy * fy * (3.0 - 2.0 * fy), uz = fz * fz * (3.0 - 2.0 * fz);
            let n000 = hash(ix, iy, iz), n100 = hash(ix + 1, iy, iz), n010 = hash(ix, iy + 1, iz), n110 = hash(ix + 1, iy + 1, iz);
            let n001 = hash(ix, iy, iz + 1), n101 = hash(ix + 1, iy, iz + 1), n011 = hash(ix, iy + 1, iz + 1), n111 = hash(ix + 1, iy + 1, iz + 1);
            let nx00 = n000 * (1 - ux) + n100 * ux, nx10 = n010 * (1 - ux) + n110 * ux;
            let nx01 = n001 * (1 - ux) + n101 * ux, nx11 = n011 * (1 - ux) + n111 * ux;
            let nxy0 = nx00 * (1 - uy) + nx10 * uy, nxy1 = nx01 * (1 - uy) + nx11 * uy;
            return nxy0 * (1 - uz) + nxy1 * uz;
        }

        let fullTextStream = "DATA_PIPELINE_ACTIVE:200_OK // PIPELINE_LATENCY:14MS // USER_RETENTION:OPTIMIZED // ";
        
        async function init() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                fullTextStream = [...data.inner, ...data.middle, ...data.outer].join(" // ") + " // ";
            } catch (e) {}
            resizeCanvas(); 
            window.addEventListener('resize', resizeCanvas);
            animate();      
        }

        let time = 0;
        const FONT_SIZE = 10;
        const CHAR_WIDTH = 6.5; 
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 🌟 이 값이 퍼져나가는 속도를 결정해!
            time += 0.02; 

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // 🌟 가운데 뻥 뚫어놓을 반경 크기 (화면 크기에 비례)
            const emptyRadius = Math.min(canvas.width, canvas.height) * 0.28; 

            // 1. 매 프레임마다 안에서 밖으로 퍼져나가는 물결(Wave) 지형 생성
            for (let i = 0; i < cols; i++) {
                grid[i] = [];
                for (let j = 0; j < rows; j++) {
                    let px = i * GRID_RES;
                    let py = j * GRID_RES;
                    
                    // 중앙으로부터의 거리
                    let dist = Math.hypot(px - centerX, py - centerY);
                    
                    // 핵심: 거리에 따라 파동이 퍼져나가는 공식 sin(거리 - 시간)
                    let wave = Math.sin(dist * 0.015 - time) * 1.5;
                    
                    // 기본 노이즈 + 파동
                    let val = baseNoiseGrid[i][j] + wave;

                    // 🌟 중앙 비우기 마스크 적용
                    // 거리가 emptyRadius보다 작으면 값을 확 올려서 등고선이 안 그려지게 만듦
                    if (dist < emptyRadius) {
                        val += 10; 
                    } else if (dist < emptyRadius + 80) {
                        // 경계선이 칼같이 잘리지 않도록 부드럽게 페이드아웃
                        let factor = (emptyRadius + 80 - dist) / 80;
                        val += factor * 10; 
                    }

                    grid[i][j] = val;
                }
            }

            // 2. 등고선 레벨 (성능 최적화를 위해 개수 조절)
            let thresholds = [-1.5, -1.0, -0.5, 0, 0.5, 1.0, 1.5];
            let allPaths = [];

            // 3. Marching Squares 알고리즘
            for (let t of thresholds) {
                let segments = [];
                for (let i = 0; i < cols - 1; i++) {
                    for (let j = 0; j < rows - 1; j++) {
                        let v0 = grid[i][j], v1 = grid[i + 1][j], v2 = grid[i + 1][j + 1], v3 = grid[i][j + 1];
                        let state = 0;
                        if (v0 > t) state |= 1;
                        if (v1 > t) state |= 2;
                        if (v2 > t) state |= 4;
                        if (v3 > t) state |= 8;

                        if (state === 0 || state === 15) continue;

                        let p = (vA, vB) => (Math.abs(vB - vA) < 0.0001) ? 0.5 : (t - vA) / (vB - vA);

                        let top = [i + p(v0, v1), j];
                        let right = [i + 1, j + p(v1, v2)];
                        let bottom = [i + p(v3, v2), j + 1];
                        let left = [i, j + p(v0, v3)];

                        let pts = [];
                        if (state === 1 || state === 14) pts.push(left, top);
                        else if (state === 2 || state === 13) pts.push(top, right);
                        else if (state === 4 || state === 11) pts.push(right, bottom);
                        else if (state === 8 || state === 7) pts.push(bottom, left);
                        else if (state === 3 || state === 12) pts.push(left, right);
                        else if (state === 6 || state === 9) pts.push(top, bottom);
                        else if (state === 5) pts.push(left, top, right, bottom);
                        else if (state === 10) pts.push(top, right, bottom, left);

                        if (pts.length === 2) segments.push({p1: pts[0], p2: pts[1]});
                        if (pts.length === 4) { segments.push({p1: pts[0], p2: pts[1]}); segments.push({p1: pts[2], p2: pts[3]}); }
                    }
                }

                let ptKey = p => p[0].toFixed(1) + ',' + p[1].toFixed(1);
                let adj = new Map();
                for (let s of segments) {
                    let k1 = ptKey(s.p1), k2 = ptKey(s.p2);
                    if (!adj.has(k1)) adj.set(k1, []);
                    if (!adj.has(k2)) adj.set(k2, []);
                    adj.get(k1).push({k: k2, pt: s.p2, seg: s});
                    adj.get(k2).push({k: k1, pt: s.p1, seg: s});
                }

                let visitedSegs = new Set();
                for (let s of segments) {
                    if (visitedSegs.has(s)) continue;
                    let path = [s.p1, s.p2];
                    visitedSegs.add(s);
                    
                    let currK = ptKey(s.p2);
                    while(true) {
                        let nexts = adj.get(currK) || [];
                        let found = false;
                        for (let n of nexts) {
                            if (!visitedSegs.has(n.seg)) {
                                visitedSegs.add(n.seg); path.push(n.pt); currK = n.k; found = true; break;
                            }
                        }
                        if (!found) break;
                    }
                    allPaths.push(path);
                }
            }

            // 4. 경로 위에 글자 그리기
            ctx.font = `${FONT_SIZE}px monospace`;
            ctx.textBaseline = "middle";
            ctx.fillStyle = "rgba(255, 255, 255, 0.45)"; // 글자 투명도 조절

            for (let path of allPaths) {
                if(path.length < 5) continue; 

                // 선이 퍼져나가는 방향과 일치하도록 오프셋 부여
                let currentLen = 0; 
                let charIdx = 0;
                let pIdx = 0;

                while(pIdx < path.length - 1) {
                    let p1 = path[pIdx], p2 = path[pIdx+1];
                    let dx = (p2[0] - p1[0]) * GRID_RES;
                    let dy = (p2[1] - p1[1]) * GRID_RES;
                    let dist = Math.hypot(dx, dy);

                    if (currentLen + CHAR_WIDTH <= dist) {
                        let t = currentLen / dist;
                        let cx = p1[0] * GRID_RES + dx * t;
                        let cy = p1[1] * GRID_RES + dy * t;
                        let angle = Math.atan2(dy, dx);

                        ctx.save();
                        ctx.translate(cx, cy);
                        ctx.rotate(angle);
                        ctx.fillText(fullTextStream[charIdx % fullTextStream.length], 0, 0);
                        ctx.restore();

                        currentLen += CHAR_WIDTH;
                        charIdx++;
                    } else {
                        currentLen -= dist;
                        pIdx++;
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        document.fonts.ready.then(() => { init(); });
    </script>
</body>
</html>
