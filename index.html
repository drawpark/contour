<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA TO INSIGHT</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #topoCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        .center-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; pointer-events: none;
        }
        .title {
            color: #fff; font-size: 3.5rem; font-weight: 800;
            letter-spacing: 0.6rem; margin: 0; text-transform: uppercase;
            white-space: nowrap;
        }
        .subtitle {
            color: #666; font-size: 0.85rem; letter-spacing: 0.25rem;
            margin-top: 12px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="center-container">
        <h1 class="title">DATA TO INSIGHT</h1>
        <div class="subtitle">Generic Product & SaaS Designer Portfolio</div>
    </div>

    <canvas id="topoCanvas"></canvas>

    <script>
        const canvas = document.getElementById('topoCanvas');
        const ctx = canvas.getContext('2d');

        // 1. 완벽한 반응형 캔버스 설정
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 마우스 인터랙션 좌표
        const mouse = { x: null, y: null, radius: 180, activeRadius: 0 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            // 마우스가 움직일 때 반응 반경을 부드럽게 키움
            mouse.activeRadius = Math.min(mouse.radius, mouse.activeRadius + 10);
        });
        window.addEventListener('mouseout', () => {
            mouse.x = null; mouse.y = null; mouse.activeRadius = 0;
        });

        // 2. JSON 데이터 비동기 로드 및 실행
        let rings = [];
        const totalRings = 28; // 촘촘한 고밀도 지형을 위해 등고선 수 대폭 증가

        async function init() {
            try {
                const response = await fetch('data.json');
                const dataLayers = await response.json();
                createTopography(dataLayers);
                animate();
            } catch (error) {
                console.error("데이터 로드 실패:", error);
            }
        }

        function createTopography(dataLayers) {
            for (let i = 0; i < totalRings; i++) {
                const ratio = i / totalRings;
                let textSet = dataLayers.inner;
                let color = `rgba(255, 255, 255, ${0.85 - ratio * 0.4})`; // 안쪽은 선명하게, 바깥은 은은하게
                
                if (ratio > 0.25 && ratio <= 0.65) {
                    textSet = dataLayers.middle;
                } else if (ratio > 0.65) {
                    textSet = dataLayers.outer;
                }

                rings.push({
                    id: i,
                    ratio: ratio,
                    textSet: textSet,
                    color: color,
                    // 비대칭 지형 변형을 위한 고유 오프셋 값들
                    noiseSeedX: Math.random() * 50,
                    noiseSeedY: Math.random() * 50,
                    speed: 0.003 + (1 - ratio) * 0.002
                });
            }
        }

        let time = 0;

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time += 0.4;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxRadius = Math.max(canvas.width, canvas.height) * 0.7;

            rings.forEach((ring) => {
                ctx.fillStyle = ring.color;
                ctx.font = "10px monospace";

                // 등고선의 기본 반지름 (중심에서 바깥으로 확장)
                const baseRadius = 80 + ring.ratio * maxRadius;
                
                // 글자 수 조절 (선이 길어질수록 촘촘하게 배치)
                const numTexts = Math.floor(baseRadius * 0.08);

                for (let j = 0; j < numTexts; j++) {
                    const angle = (j / numTexts) * Math.PI * 2;

                    // 3. 진짜 등고선 느낌을 내는 '비대칭 유기체 노이즈 필드' 계산
                    // 뱅글뱅글 도는 회전 운동을 배제하고, 여러 위상의 사인파를 중첩하여 지형이 일렁이게 만듦
                    let wave = Math.sin(angle * 3 + time * 0.01 + ring.noiseSeedX) * 25
                             + Math.cos(angle * 5 - time * 0.015 + ring.noiseSeedY) * 15
                             + Math.sin(angle * 1 + time * 0.005) * (40 * ring.ratio); // 바깥쪽으로 갈수록 비대칭 왜곡률 증가

                    // 고정된 원이 아니라 찌그러진 지형 선상의 반지름 계산
                    let currentRadius = baseRadius + wave;

                    // 기본 지형 좌푯값
                    let x = centerX + Math.cos(angle) * currentRadius;
                    let y = centerY + Math.sin(angle) * currentRadius;

                    // 4. 마우스 호버 반응 (부드러운 밀려남 유체 역학 효과)
                    if (mouse.x !== null && mouse.y !== null) {
                        const dx = x - mouse.x;
                        const dy = y - mouse.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < mouse.activeRadius) {
                            // 마우스 중심점과의 거리에 비례한 밀어내는 힘 (가까울수록 강함)
                            const force = (mouse.activeRadius - distance) / mouse.activeRadius;
                            const push = force * 45; 
                            
                            x += (dx / distance) * push;
                            y += (dy / distance) * push;
                        }
                    }

                    // 텍스트 그리기 및 지형 선에 맞춘 정교한 회전 값 부여
                    const text = ring.textSet[j % ring.textSet.length];
                    
                    ctx.save();
                    ctx.translate(x, y);
                    // 텍스트가 단순히 원을 도는 게 아니라, 등고선의 꺾이는 곡률에 맞춰 정렬되도록 조정
                    ctx.rotate(angle + Math.PI / 2 + (wave * 0.002));
                    ctx.fillText(text, 0, 0);
                    ctx.restore();
                }
            });

            requestAnimationFrame(animate);
        }

        // 실행
        init();
    </script>
</body>
</html>
