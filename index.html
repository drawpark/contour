<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA TO INSIGHT</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; 
            background-color: #050505; /* 레퍼런스에 맞춘 극도로 깊은 무광 블랙 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #topoCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        .center-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; pointer-events: none;
        }
        .title {
            color: #ffffff; font-size: 4rem; font-weight: 700;
            letter-spacing: 0.6rem; margin: 0; text-transform: uppercase;
            white-space: nowrap;
        }
        .subtitle {
            color: #555555; font-size: 0.85rem; letter-spacing: 0.4rem;
            margin-top: 16px; text-transform: uppercase; font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="center-container">
        <h1 class="title">PORTFOLIO</h1>
        <div class="subtitle">DATA TO INSIGHT / PRODUCT DESIGN 2024</div>
    </div>

    <canvas id="topoCanvas"></canvas>

    <script>
        const canvas = document.getElementById('topoCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // --- 🚀 초경량 3D 노이즈 함수 (선이 교차하지 않는 부드러운 지형 생성용) ---
        // 복잡도를 극도로 낮춰 렉을 방지합니다.
        function hash(x, y, z) {
            let h = Math.sin(x * 12.9898 + y * 78.233 + z * 37.719) * 43758.5453123;
            return h - Math.floor(h);
        }
        function noise3D(x, y, z) {
            let ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
            let fx = x - ix, fy = y - iy, fz = z - iz;
            let ux = fx * fx * (3.0 - 2.0 * fx), uy = fy * fy * (3.0 - 2.0 * fy), uz = fz * fz * (3.0 - 2.0 * fz);
            let n000 = hash(ix, iy, iz), n100 = hash(ix + 1, iy, iz), n010 = hash(ix, iy + 1, iz), n110 = hash(ix + 1, iy + 1, iz);
            let n001 = hash(ix, iy, iz + 1), n101 = hash(ix + 1, iy, iz + 1), n011 = hash(ix, iy + 1, iz + 1), n111 = hash(ix + 1, iy + 1, iz + 1);
            let nx00 = n000 * (1 - ux) + n100 * ux, nx10 = n010 * (1 - ux) + n110 * ux;
            let nx01 = n001 * (1 - ux) + n101 * ux, nx11 = n011 * (1 - ux) + n111 * ux;
            let nxy0 = nx00 * (1 - uy) + nx10 * uy, nxy1 = nx01 * (1 - uy) + nx11 * uy;
            return nxy0 * (1 - uz) + nxy1 * uz;
        }

        // --- 🎨 디자인 및 렌더링 설정 ---
        const RINGS_COUNT = 38;       // 등고선 개수
        const RING_GAP = 18;          // 선과 선 사이의 기본 간격
        const MAX_NOISE_AMP = 14;     // ★핵심: 이 값이 RING_GAP보다 작아야 선이 절대 안 겹침!
        const FONT_SIZE = 7;          // 레퍼런스처럼 아주 작고 미니멀한 텍스트
        const CHAR_WIDTH = 4.2;       // measureText 대신 고정폭 캐싱 (렉 원천 차단)
        
        let rings = [];

        async function init() {
            try {
                const response = await fetch('data.json');
                const dataLayers = await response.json();
                
                for (let i = 0; i < RINGS_COUNT; i++) {
                    const ratio = i / RINGS_COUNT;
                    let textSet = dataLayers.inner;
                    // 바깥으로 갈수록 어둡게 페이드아웃 (레퍼런스의 깊이감 연출)
                    let opacity = 0.35 - (ratio * 0.25); 
                    
                    if (ratio > 0.25 && ratio <= 0.6) textSet = dataLayers.middle;
                    else if (ratio > 0.6) textSet = dataLayers.outer;

                    // 무한히 흐르도록 문장 끝에 공백 추가하여 스트림 생성
                    let fullString = textSet.join("  |  ") + "  |  ";

                    rings.push({ 
                        baseRadius: 100 + i * RING_GAP, // 중심으로부터의 거리
                        textStream: fullString,
                        opacity: opacity,
                        flowOffset: 0, // 글자가 선을 따라 흐르는 속도 변수
                        flowSpeed: 0.2 + (1 - ratio) * 0.3 // 안쪽이 미세하게 더 빠름
                    });
                }
                animate();
            } catch (e) { console.error("JSON 로드 에러:", e); }
        }

        let time = 0;

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // time 변수가 천천히 증가하며 지형 전체가 유기적으로 꿈틀거리게 만듦
            time += 0.0015; 

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            ctx.font = `${FONT_SIZE}px monospace`;
            ctx.textBaseline = "middle";

            rings.forEach((ring) => {
                // 1. 이번 프레임의 등고선 경로(Path)를 계산
                const pathPoints = [];
                const steps = 300; // 원을 300조각 내서 부드러운 곡선 생성
                let totalPathLength = 0;
                
                for (let i = 0; i <= steps; i++) {
                    let angle = (i / steps) * Math.PI * 2;
                    let nx = Math.cos(angle) * 1.2; 
                    let ny = Math.sin(angle) * 1.2;
                    
                    // 3D 노이즈를 사용해 시간에 따라 유기적으로 변하는 지형 굴곡 생성
                    let n = noise3D(nx, ny, time) * 2.0 - 1.0; 
                    let radius = ring.baseRadius + (n * MAX_NOISE_AMP);

                    let x = centerX + Math.cos(angle) * radius;
                    let y = centerY + Math.sin(angle) * radius;
                    
                    if (i > 0) {
                        let prev = pathPoints[i - 1];
                        let dist = Math.sqrt(Math.pow(x - prev.x, 2) + Math.pow(y - prev.y, 2));
                        totalPathLength += dist;
                    }
                    pathPoints.push({ x, y, lengthSoFar: totalPathLength });
                }

                // 2. 글자가 선을 따라 무한히 흐르도록 오프셋 업데이트
                ring.flowOffset = (ring.flowOffset + ring.flowSpeed) % totalPathLength;

                // 3. 계산된 경로 위에 글자 하나하나를 정확한 기울기로 눕혀서 그리기
                ctx.fillStyle = `rgba(255, 255, 255, ${ring.opacity})`;
                
                let currentDist = ring.flowOffset;
                let charIndex = 0;
                
                // 경로 전체 길이를 채울 때까지 글자 반복 렌더링
                while (currentDist < totalPathLength) {
                    let char = ring.textStream[charIndex % ring.textStream.length];
                    
                    // 현재 거리에 해당하는 경로상의 선분 찾기 (이진 탐색 대신 선형 탐색 최적화)
                    let p1, p2;
                    for (let i = 0; i < pathPoints.length - 1; i++) {
                        if (currentDist >= pathPoints[i].lengthSoFar && currentDist <= pathPoints[i+1].lengthSoFar) {
                            p1 = pathPoints[i];
                            p2 = pathPoints[i+1];
                            break;
                        }
                    }

                    if (p1 && p2) {
                        // 두 점 사이의 비율을 구해 정확한 글자 위치와 기울기(접선) 계산
                        let segmentLen = p2.lengthSoFar - p1.lengthSoFar;
                        let t = segmentLen === 0 ? 0 : (currentDist - p1.lengthSoFar) / segmentLen;
                        
                        let charX = p1.x + (p2.x - p1.x) * t;
                        let charY = p1.y + (p2.y - p1.y) * t;
                        let angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);

                        ctx.save();
                        ctx.translate(charX, charY);
                        ctx.rotate(angle);
                        ctx.fillText(char, 0, 0);
                        ctx.restore();
                    }

                    // 다음 글자를 그릴 거리 (글자 폭 + 미세한 자간)
                    currentDist += CHAR_WIDTH;
                    charIndex++;
                }
            });

            requestAnimationFrame(animate);
        }

        // 폰트가 로드될 시간을 살짝 벌어준 뒤 실행 (더 깔끔한 렌더링을 위해)
        document.fonts.ready.then(() => {
            init();
        });
    </script>
</body>
</html>
