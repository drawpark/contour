<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA TO INSIGHT</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; 
            background-color: #080808; 
            font-family: monospace;
        }
        #topoCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
    </style>
</head>
<body>
    <canvas id="topoCanvas"></canvas>

    <script>
        const canvas = document.getElementById('topoCanvas');
        const ctx = canvas.getContext('2d');

        const GRID_RES = 16; 
        let cols, rows;
        let grid = [];
        let allPaths = []; // 🌟 계산된 등고선 경로를 저장해둘 배열
        const randomSeed = Math.random() * 1000; // 새로고침마다 다른 지형 생성

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.ceil(canvas.width / GRID_RES) + 1;
            rows = Math.ceil(canvas.height / GRID_RES) + 1;
            generatePaths(); // 🌟 화면 크기가 바뀔 때만 지형을 다시 계산!
        }
        
        window.addEventListener('resize', resizeCanvas);

        // 가볍고 강력한 3D 노이즈 함수
        function hash(x, y, z) {
            let h = Math.sin(x * 12.9898 + y * 78.233 + z * 37.719) * 43758.5453123;
            return h - Math.floor(h);
        }
        function noise3D(x, y, z) {
            let ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
            let fx = x - ix, fy = y - iy, fz = z - iz;
            let ux = fx * fx * (3.0 - 2.0 * fx), uy = fy * fy * (3.0 - 2.0 * fy), uz = fz * fz * (3.0 - 2.0 * fz);
            let n000 = hash(ix, iy, iz), n100 = hash(ix + 1, iy, iz), n010 = hash(ix, iy + 1, iz), n110 = hash(ix + 1, iy + 1, iz);
            let n001 = hash(ix, iy, iz + 1), n101 = hash(ix + 1, iy, iz + 1), n011 = hash(ix, iy + 1, iz + 1), n111 = hash(ix + 1, iy + 1, iz + 1);
            let nx00 = n000 * (1 - ux) + n100 * ux, nx10 = n010 * (1 - ux) + n110 * ux;
            let nx01 = n001 * (1 - ux) + n101 * ux, nx11 = n011 * (1 - ux) + n111 * ux;
            let nxy0 = nx00 * (1 - uy) + nx10 * uy, nxy1 = nx01 * (1 - uy) + nx11 * uy;
            return nxy0 * (1 - uz) + nxy1 * uz;
        }

        let fullTextStream = "DATA_PIPELINE_ACTIVE:200_OK // PIPELINE_LATENCY:14MS // USER_RETENTION:OPTIMIZED // ";
        
        async function init() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                fullTextStream = [...data.inner, ...data.middle, ...data.outer].join(" // ") + " // ";
            } catch (e) {
                console.log("data.json 로드 대기 중 (기본 텍스트 사용)");
            }
            resizeCanvas(); // 초기 세팅 및 지형 계산
            animate();      // 애니메이션 시작
        }

        // 🌟 무거운 계산을 한 번만 수행하는 함수로 분리
        function generatePaths() {
            allPaths = [];
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const hillRadius = Math.min(canvas.width, canvas.height) * 0.45; 

            // 1. 노이즈 필드 그리드 생성
            for (let i = 0; i < cols; i++) {
                grid[i] = [];
                for (let j = 0; j < rows; j++) {
                    let px = i * GRID_RES;
                    let py = j * GRID_RES;
                    
                    let baseNoise = noise3D(i * 0.04, j * 0.04, randomSeed); 
                    let distortX = px + noise3D(i * 0.02, j * 0.02, randomSeed) * 250;
                    let distortY = py + noise3D(i * 0.02 + 10, j * 0.02 + 10, randomSeed) * 250;

                    let dist = Math.hypot(distortX - centerX, distortY - centerY);
                    let mountainBump = Math.exp(-Math.pow(dist / hillRadius, 2)) * 1.8;
                    
                    grid[i][j] = baseNoise + mountainBump; 
                }
            }

            // 2. 등고선 레벨 설정
            let thresholds = [];
            for(let i = 0; i < 26; i++) {
                thresholds.push(-0.7 + (i / 25) * 1.8); 
            }

            // 3. Marching Squares 알고리즘
            for (let t of thresholds) {
                let segments = [];
                for (let i = 0; i < cols - 1; i++) {
                    for (let j = 0; j < rows - 1; j++) {
                        let v0 = grid[i][j], v1 = grid[i + 1][j], v2 = grid[i + 1][j + 1], v3 = grid[i][j + 1];
                        let state = 0;
                        if (v0 > t) state |= 1;
                        if (v1 > t) state |= 2;
                        if (v2 > t) state |= 4;
                        if (v3 > t) state |= 8;

                        if (state === 0 || state === 15) continue;

                        let p = (vA, vB) => (Math.abs(vB - vA) < 0.0001) ? 0.5 : (t - vA) / (vB - vA);

                        let top = [i + p(v0, v1), j];
                        let right = [i + 1, j + p(v1, v2)];
                        let bottom = [i + p(v3, v2), j + 1];
                        let left = [i, j + p(v0, v3)];

                        let pts = [];
                        if (state === 1 || state === 14) pts.push(left, top);
                        else if (state === 2 || state === 13) pts.push(top, right);
                        else if (state === 4 || state === 11) pts.push(right, bottom);
                        else if (state === 8 || state === 7) pts.push(bottom, left);
                        else if (state === 3 || state === 12) pts.push(left, right);
                        else if (state === 6 || state === 9) pts.push(top, bottom);
                        else if (state === 5) pts.push(left, top, right, bottom);
                        else if (state === 10) pts.push(top, right, bottom, left);

                        if (pts.length === 2) segments.push({p1: pts[0], p2: pts[1]});
                        if (pts.length === 4) { segments.push({p1: pts[0], p2: pts[1]}); segments.push({p1: pts[2], p2: pts[3]}); }
                    }
                }

                let ptKey = p => p[0].toFixed(2) + ',' + p[1].toFixed(2);
                let adj = new Map();
                for (let s of segments) {
                    let k1 = ptKey(s.p1), k2 = ptKey(s.p2);
                    if (!adj.has(k1)) adj.set(k1, []);
                    if (!adj.has(k2)) adj.set(k2, []);
                    adj.get(k1).push({k: k2, pt: s.p2, seg: s});
                    adj.get(k2).push({k: k1, pt: s.p1, seg: s});
                }

                let visitedSegs = new Set();
                for (let s of segments) {
                    if (visitedSegs.has(s)) continue;
                    let path = [s.p1, s.p2];
                    visitedSegs.add(s);
                    
                    let currK = ptKey(s.p2);
                    while(true) {
                        let nexts = adj.get(currK) || [];
                        let found = false;
                        for (let n of nexts) {
                            if (!visitedSegs.has(n.seg)) {
                                visitedSegs.add(n.seg); path.push(n.pt); currK = n.k; found = true; break;
                            }
                        }
                        if (!found) break;
                    }
                    
                    currK = ptKey(s.p1);
                    while(true) {
                        let nexts = adj.get(currK) || [];
                        let found = false;
                        for (let n of nexts) {
                            if (!visitedSegs.has(n.seg)) {
                                visitedSegs.add(n.seg); path.unshift(n.pt); currK = n.k; found = true; break;
                            }
                        }
                        if (!found) break;
                    }
                    
                    for (let iter = 0; iter < 2; iter++) {
                        let smoothed = [path[0]];
                        for (let k = 1; k < path.length - 1; k++) smoothed.push([path[k][0]*0.5 + path[k-1][0]*0.25 + path[k+1][0]*0.25, path[k][1]*0.5 + path[k-1][1]*0.25 + path[k+1][1]*0.25]);
                        smoothed.push(path[path.length - 1]);
                        path = smoothed;
                    }
                    allPaths.push(path);
                }
            }
        }

        let flowOffset = 0;
        const FONT_SIZE = 10;
        const CHAR_WIDTH = 6; 
        const FLOW_SPEED = 0.5; // 🌟 텍스트 흐르는 속도 조절

        // 🌟 가벼워진 애니메이션 루프 (텍스트만 그림)
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            flowOffset += FLOW_SPEED; // 텍스트를 앞으로 전진시킴

            ctx.font = `${FONT_SIZE}px monospace`;
            ctx.textBaseline = "middle";
            ctx.fillStyle = "rgba(255, 255, 255, 0.55)"; 

            for (let path of allPaths) {
                if(path.length < 5) continue; 

                // 각 경로마다 약간씩 다른 오프셋을 주어 더 유기적으로 보이게 함
                let currentLen = (flowOffset + path[0][0] * 10) % 1000; 
                let charIdx = 0;
                let pIdx = 0;

                while(pIdx < path.length - 1) {
                    let p1 = path[pIdx], p2 = path[pIdx+1];
                    let dx = (p2[0] - p1[0]) * GRID_RES;
                    let dy = (p2[1] - p1[1]) * GRID_RES;
                    let dist = Math.hypot(dx, dy);

                    if (currentLen + CHAR_WIDTH <= dist) {
                        let t = currentLen / dist;
                        let cx = p1[0] * GRID_RES + dx * t;
                        let cy = p1[1] * GRID_RES + dy * t;
                        let angle = Math.atan2(dy, dx);

                        ctx.save();
                        ctx.translate(cx, cy);
                        ctx.rotate(angle);
                        ctx.fillText(fullTextStream[charIdx % fullTextStream.length], 0, 0);
                        ctx.restore();

                        currentLen += CHAR_WIDTH;
                        charIdx++;
                    } else {
                        currentLen -= dist;
                        pIdx++;
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        document.fonts.ready.then(() => { init(); });
    </script>
</body>
</html>
